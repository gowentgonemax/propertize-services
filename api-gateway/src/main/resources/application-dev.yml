# ============================================================================
# API Gateway - DEV Environment
# ============================================================================
# This profile is for shared development environment
# Services may run on separate servers
# ============================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "${FRONTEND_URL:http://localhost:3000}"
              - "http://dev.propertize.com"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

# Eureka Client Configuration
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin@service-registry:8761/eureka/}
    registry-fetch-interval-seconds: 10
  instance:
    hostname: ${HOSTNAME:api-gateway}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      environment: dev

# JWT Configuration (must match auth-service)
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-key-change-in-production-min-32-chars}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public_key.pem}
  access-token-validity: ${JWT_ACCESS_VALIDITY:900000}
  refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800000}

# Rate Limiting
gateway:
  rate-limit:
    enabled: true
    default-replenish-rate: 200
    default-burst-capacity: 400
  timeout:
    global: 30s
    per-route: 60s

# Logging
logging:
  level:
    root: INFO
    com.propertize.platform.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.web.server: WARN
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
