# ============================================================================
# API Gateway — DOCKER profile
# Active when: SPRING_PROFILES_ACTIVE=docker   (set by docker-compose.yml)
# Hosts:  redis:6379  service-registry:8761
# Routes: lb://  (Eureka load-balanced — no hardcoded service URLs)
# ============================================================================
server:
  port: 8080
  # Spring Boot 3.x — increase Netty max request header size to 64 KB.
  # Default is 8 KB which is exceeded when the gateway adds X-Permissions + X-Roles +
  # other context headers on top of the incoming Authorization header.
  max-http-request-header-size: 65536
  netty:
    max-initial-line-length: 65536

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://frontend:3000"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            # Strip Cookie — NextAuth session cookies are frontend-only; forwarding them
            # to downstream Java services inflates header size and triggers HTTP 431.
            - RemoveRequestHeader=Cookie
            - RemoveRequestHeader=Set-Cookie
          # Docker: lb:// routes via Eureka — no hardcoded hostnames
          routes:
            - id: swagger-propertize
              uri: lb://employee-service
              predicates:
                - Path=/swagger-ui.html,/swagger-ui/**,/v3/api-docs/**,/api-docs/**,/webjars/**
              filters:
                - StripPrefix=0

            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - StripPrefix=0

            - id: rbac-public
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/rbac/**
              filters:
                - StripPrefix=0

            - id: propertize-admin-shortcut
              uri: lb://propertize-service
              predicates:
                - Path=/admin/**
              filters:
                - RewritePath=/admin/(?<segment>.*), /api/v1/admin/${segment}

            - id: propertize-v1-shortcut
              uri: lb://propertize-service
              predicates:
                - Path=/v1/**
              filters:
                - RewritePath=/v1/(?<segment>.*), /api/v1/${segment}

            - id: propertize-service
              uri: lb://propertize-service
              predicates:
                - Path=/api/v1/properties/**,/api/v1/tenants/**,/api/v1/leases/**,/api/v1/invoices/**,/api/v1/maintenance/**,/api/v1/organizations/**,/api/v1/users/**,/api/v1/rental-applications/**,/api/v1/admin/**,/graphql,/graphiql,/api/v1/analytics/**,/api/v1/assets/**,/api/v1/audit/**,/api/v1/contacts/**,/api/v1/expenses/**,/api/v1/notifications/**,/api/v1/notification-preferences/**,/api/v1/reports/**,/api/v1/search/**,/api/v1/tasks/**,/api/v1/vendors/**,/api/v1/messages/**,/api/v1/support/**,/api/v1/late-fees/**,/api/v1/metrics/**,/api/public/**,/api/v1/diagnostics/**,/api/v1/milestones/**,/api/v1/documents/**,/api/v1/approvals/**,/api/v1/inspections/**,/api/v1/sessions/**,/api/v1/utilities/**,/api/v1/logs/**
              filters:
                - StripPrefix=0

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**,/api/v1/stripe/**,/api/v1/webhooks/stripe/**,/api/v1/payment-methods/**,/api/v1/payment-reminders/**,/api/v1/application-fees/**,/api/v1/organization-application-fees/**,/api/v1/transactions/**,/api/v1/promo-codes/**
              filters:
                - StripPrefix=0

            - id: employee-service
              uri: lb://employee-service
              predicates:
                - Path=/api/v1/employees/**
              filters:
                - StripPrefix=0

            - id: payroll-service
              uri: lb://payroll-service
              predicates:
                - Path=/api/v1/departments/**,/api/v1/timesheets/**,/api/v1/leaves/**,/api/v1/leave/**,/api/v1/compensation/**,/api/v1/time-entries/**,/api/v1/clients/**,/api/v1/payroll/**,/api/v1/tax/**
              filters:
                - StripPrefix=0

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:redis_secure_pass}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://admin:admin@service-registry:8761/eureka/
    registry-fetch-interval-seconds: 5
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: api-gateway # Docker container/service name
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# RSA public key — Dockerfile copies config/ → /app/config/
jwt:
  public-key-path: /app/config/keys/public_key.pem
  rsa:
    public-key-path: /app/config/keys/public_key.pem

security:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-key-change-in-production-min-32-chars-propertize}

gateway:
  rate-limit:
    enabled: true
    default-replenish-rate: 100
    default-burst-capacity: 200
  timeout:
    global: 30s
    per-route: 60s

# Rate limiter configuration (binds to RateLimitingFilter @Value annotations)
rate-limit:
  enabled: true
  default-requests-per-minute: 2000
  authenticated-requests-per-minute: 3000
  auth-endpoint-requests-per-minute: 120
  burst-multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,routes
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted

logging:
  level:
    root: INFO
    com.propertize.platform.gateway: INFO
    org.springframework.cloud.gateway: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [DOCKER][gateway] [%X{correlationId}] %-5level %logger{30} - %msg%n"
