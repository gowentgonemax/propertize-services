  # ============================================================================
  # SCOPE DEFINITIONS - Hierarchical access levels
  # ============================================================================
  scopes:
    platform:
      level: 4
      description: "Platform-wide access across all organizations"
      inherits: ["portfolio", "organization", "team", "self"]
      features:
        - crossOrganizationAccess
        - systemAdministration
        - globalReporting
        - platformConfiguration

    portfolio:
      level: 3
      description: "Multi-organization portfolio management"
      inherits: ["organization", "team", "self"]
      features:
        - multiOrganizationAccess
        - portfolioReporting
        - crossOrgWorkflows

    organization:
      level: 2
      description: "Single organization full access"
      inherits: ["team", "self"]
      features:
        - organizationAdministration
        - userManagement
        - roleManagement
        - organizationReporting

    team:
      level: 1
      description: "Team or department level access"
      inherits: ["self"]
      features:
        - teamCollaboration
        - assignedResourceAccess

    self:
      level: 0
      description: "Personal resources only"
      inherits: []
      features:
        - profileManagement
        - ownDataAccess

  # ============================================================================
  # RESOURCE DEFINITIONS - Domain entities with their capabilities
  # ============================================================================
  resources:
    property:
      category: "core_business"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "manage",
          "list",
          "export",
          "archive",
          "transfer",
        ]
      ownerField: "organizationId"
      allowedScopes: ["platform", "portfolio", "organization", "team"]
      auditRequired: true
      relationships:
        hasMany: ["lease", "maintenance", "inspection", "asset"]
        belongsTo: ["organization"]

    lease:
      category: "core_business"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "terminate",
          "renew",
          "list",
          "approve",
          "export",
        ]
      ownerField: "propertyId"
      allowedScopes: ["portfolio", "organization", "team", "self"]
      auditRequired: true
      relationships:
        belongsTo: ["property", "tenant"]
        hasMany: ["payment", "document"]

    tenant:
      category: "core_business"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "manage",
          "communicate",
          "list",
          "export",
          "screen",
        ]
      ownerField: "organizationId"
      piiFields: ["ssn", "creditScore", "bankAccount", "dob", "phone", "email"]
      allowedScopes: ["portfolio", "organization", "team"]
      auditRequired: true
      dataRetentionDays: 2555
      relationships:
        hasMany: ["lease", "payment", "rental_application"]

    rental_application:
      category: "core_business"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "submit",
          "approve",
          "reject",
          "review",
          "manage",
          "list",
          "export",
          "track",
        ]
      ownerField: "organizationId"
      piiFields:
        [
          "firstName",
          "lastName",
          "email",
          "phone",
          "ssn",
          "currentAddress",
          "employer",
        ]
      allowedScopes: ["platform", "portfolio", "organization", "team"]
      auditRequired: true
      requiresApproval: true
      dataRetentionDays: 2555
      relationships:
        belongsTo: ["property", "tenant"]

    payment:
      category: "financial"
      actions:
        [
          "create",
          "read",
          "process",
          "refund",
          "track",
          "approve",
          "list",
          "export",
          "reconcile",
        ]
      ownerField: "leaseId"
      allowedScopes: ["portfolio", "organization", "team"]
      auditRequired: true
      requiresApproval: true
      relationships:
        belongsTo: ["lease", "tenant"]

    invoice:
      category: "financial"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "send",
          "approve",
          "list",
          "export",
        ]
      ownerField: "organizationId"
      allowedScopes: ["portfolio", "organization", "team"]
      auditRequired: true
      relationships:
        belongsTo: ["organization"]

    document:
      category: "core_business"
      actions:
        [
          "upload",
          "read",
          "update",
          "delete",
          "share",
          "list",
          "download",
          "sign",
          "configure",
        ]
      ownerField: "uploadedBy"
      encryptionRequired: true
      allowedScopes: ["portfolio", "organization", "team", "self"]
      auditRequired: true
      relationships:
        polymorphic: true

    maintenance:
      category: "operations"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "assign",
          "complete",
          "list",
          "schedule",
          "approve",
        ]
      ownerField: "propertyId"
      allowedScopes: ["portfolio", "organization", "team", "self"]
      relationships:
        belongsTo: ["property"]

    inspection:
      category: "operations"
      actions:
