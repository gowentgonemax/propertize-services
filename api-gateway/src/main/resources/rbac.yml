        - "payment:delete"
        - "payment:list"
        - "payment:list_all"
        - "maintenance:create"
        - "maintenance:read"
        - "maintenance:update"
        - "maintenance:delete"
        - "maintenance:list"
        - "maintenance:list_all"
        - "invoice:create"
        - "invoice:read"
        - "invoice:update"
        - "invoice:delete"
        - "invoice:list"
        - "invoice:send"
        - "report:create"
        - "report:read"
        - "report:export"
        - "report:export_all"
        - "report:list"
        - "report:generate"
        - "notification:create"
        - "notification:read"
        - "notification:send"
        - "notification:list"
        - "notification:configure"
        - "dashboard:read"
        - "dashboard:view"
        - "dashboard:read_platform_dashboard"
        - "session:list"
        - "session:list_all"
        - "session:terminate"
        - "session:terminate_all"
        - "system:configure"
        - "system:monitor"
        - "system:backup"
        - "system:restore"
        - "audit_log:read"
        - "audit_log:export"
      capabilities:
        emergencyAccess: true
        fullSystemAccess: true
        bypassRestrictions: true
        immediateAction: true
      restrictions:
        requireMFA: true
        requireHardwareKey: true
        requireApproval: true
        autoExpireHours: 4
        auditAllActions: true
        notifyOnActivation: true
        cannotDeleteSelf: true
        emergencyOnly: true

    PLATFORM_OPERATIONS:
      description: "Platform operations and organization management"
      level: 970
      category: "platform"
      scope: "platform"
      permissions:
        - "organization:create"
        - "organization:read"
        - "organization:update"
        - "organization:configure"
        - "organization:list"
        - "organization:list_all"
        - "organization:manage"
        - "user:create"
        - "user:read"
        - "user:update"
        - "user:invite"
        - "user:list"
        - "user:list_all"
        - "property:list"
        - "property:list_all"
        - "property:view_all"
        - "report:generate"
        - "report:read"
        - "report:export"
        - "system:monitor"
        - "system:update"

    PLATFORM_ENGINEERING:
      description: "System operations and infrastructure"
      level: 950
      category: "platform"
      scope: "platform"
      permissions:
        - "system:configure"
        - "system:monitor"
        - "system:backup"
        - "system:restore"
        - "system:update"
        - "system:troubleshoot"

    PLATFORM_ANALYTICS:
      description: "Business intelligence and cross-org reporting"
      level: 930
      category: "platform"
      scope: "platform"
      permissions:
        - "report:generate"
        - "report:read"
        - "report:export"
        - "report:customize"
        - "analytics:read"
        - "analytics:export"
        - "analytics:analyze"

        - "dashboard:read"
        - "dashboard:view"
        - "dashboard:read_platform_dashboard"

    PORTFOLIO_OWNER:
      description: "Multi-organization portfolio investor"
      level: 920
      category: "portfolio"
      scope: "portfolio"
      permissions:
        - "organization:read"
        - "organization:list"
