rbac:
  version: "7.0-restructured"
  lastUpdated: "2026-04-04"

  # ============================================================================
  # CORE CONFIGURATION
  # ============================================================================
  core:
    defaultScope: "self"
    enableInheritance: true
    enableDynamicPermissions: true
    enableRoleComposition: true
    enablePermissionTemplates: true
    cachePermissions: true
    cacheTTL: 3600
    allowRuntimeRoleCreation: true
    maxCustomRolesPerClient: 10

  # ============================================================================
  # PERMISSION NAMING CONVENTION:
  # Format: RESOURCE_ACTION (e.g., USER_CREATE, PROPERTY_READ)
  # - All UPPERCASE with underscore
  # - Clear, consistent, predictable
  # ============================================================================

  # ============================================================================
  # PERMISSION HIERARCHY - Reduces duplication via inheritance
  # ============================================================================
  permissionHierarchy:
    USER_MANAGE:
      includes:
        ["USER_CREATE", "USER_READ", "USER_UPDATE", "USER_DELETE", "USER_LIST"]

    ORGANIZATION_MANAGE:
      includes:
        [
          "ORGANIZATION_CREATE",
          "ORGANIZATION_READ",
          "ORGANIZATION_UPDATE",
          "ORGANIZATION_DELETE",
          "ORGANIZATION_LIST",
          "ORGANIZATION_LIST_ALL",
          "ORGANIZATION_CONFIGURE",
        ]

    PROPERTY_MANAGE:
      includes:
        [
          "PROPERTY_CREATE",
          "PROPERTY_READ",
          "PROPERTY_UPDATE",
          "PROPERTY_DELETE",
          "PROPERTY_LIST",
        ]

    LEASE_MANAGE:
      includes:
        [
          "LEASE_CREATE",
          "LEASE_READ",
          "LEASE_UPDATE",
          "LEASE_DELETE",
          "LEASE_LIST",
          "LEASE_APPROVE",
          "LEASE_TERMINATE",
          "LEASE_RENEW",
        ]

    TENANT_MANAGE:
      includes:
        [
          "TENANT_CREATE",
          "TENANT_READ",
          "TENANT_UPDATE",
          "TENANT_DELETE",
          "TENANT_LIST",
          "TENANT_SCREEN",
          "TENANT_COMMUNICATE",
        ]

    PAYMENT_MANAGE:
      includes:
        [
          "PAYMENT_CREATE",
          "PAYMENT_READ",
          "PAYMENT_UPDATE",
          "PAYMENT_DELETE",
          "PAYMENT_LIST",
          "PAYMENT_PROCESS",
          "PAYMENT_RECONCILE",
        ]

    MAINTENANCE_MANAGE:
      includes:
        [
          "MAINTENANCE_CREATE",
          "MAINTENANCE_READ",
          "MAINTENANCE_UPDATE",
          "MAINTENANCE_DELETE",
          "MAINTENANCE_LIST",
          "MAINTENANCE_ASSIGN",
          "MAINTENANCE_APPROVE",
          "MAINTENANCE_COMPLETE",
        ]

    INVOICE_MANAGE:
      includes:
        [
          "INVOICE_CREATE",
          "INVOICE_READ",
          "INVOICE_UPDATE",
          "INVOICE_DELETE",
          "INVOICE_LIST",
          "INVOICE_SEND",
        ]

    EMPLOYEE_MANAGE:
      includes:
        [
          "EMPLOYEE_CREATE",
          "EMPLOYEE_READ",
          "EMPLOYEE_UPDATE",
          "EMPLOYEE_DELETE",
          "EMPLOYEE_LIST",
        ]

    PAYROLL_MANAGE:
      includes:
        [
          "PAYROLL_CREATE",
          "PAYROLL_READ",
          "PAYROLL_UPDATE",
          "PAYROLL_DELETE",
          "PAYROLL_LIST",
          "PAYROLL_PROCESS",
          "PAYROLL_APPROVE",
        ]

    REPORT_FULL:
      includes:
        [
          "REPORT_CREATE",
          "REPORT_READ",
          "REPORT_UPDATE",
          "REPORT_DELETE",
          "REPORT_LIST",
          "REPORT_GENERATE",
          "REPORT_EXPORT",
          "REPORT_CUSTOMIZE",
        ]

    SYSTEM_ADMIN:
      includes:
        [
          "SYSTEM_CONFIGURE",
          "SYSTEM_MONITOR",
          "SYSTEM_BACKUP",
          "SYSTEM_RESTORE",
          "SYSTEM_UPDATE",
          "SYSTEM_TROUBLESHOOT",
        ]

    VENDOR_MANAGE:
      includes:
        [
          "VENDOR_CREATE",
          "VENDOR_READ",
          "VENDOR_UPDATE",
          "VENDOR_DELETE",
          "VENDOR_LIST",
        ]

    TASK_MANAGE:
      includes:
        ["TASK_CREATE", "TASK_READ", "TASK_UPDATE", "TASK_DELETE", "TASK_LIST"]

    CONTACT_MANAGE:
      includes:
        [
          "CONTACT_CREATE",
          "CONTACT_READ",
          "CONTACT_UPDATE",
          "CONTACT_DELETE",
          "CONTACT_LIST",
        ]

    NOTIFICATION_MANAGE:
      includes:
        [
          "NOTIFICATION_CREATE",
          "NOTIFICATION_READ",
          "NOTIFICATION_SEND",
          "NOTIFICATION_LIST",
        ]

    DOCUMENT_MANAGE:
      includes:
        [
          "DOCUMENT_CREATE",
          "DOCUMENT_READ",
          "DOCUMENT_UPDATE",
          "DOCUMENT_DELETE",
          "DOCUMENT_LIST",
          "DOCUMENT_UPLOAD",
          "DOCUMENT_DOWNLOAD",
        ]

  # ============================================================================
  # SCOPE DEFINITIONS
  # ============================================================================
  scopes:
    platform:
      description: "Platform-wide access across all organizations"
      level: 1000

    portfolio:
      description: "Multiple organizations (investor/portfolio owner)"
      level: 900

    organization:
      description: "Single organization scope"
      level: 800

    team:
      description: "Team or department within organization"
      level: 500

    self:
      description: "Individual user scope only"
      level: 100

  # ============================================================================
  # ROLES CONFIGURATION (v7.0 - Restructured per business logic)
  #
  # KEY BUSINESS RULES:
  # - Organization Owner = single org landlord, NO employee/payroll access
  # - Portfolio Owner = multi-org investor, FULL access including employee/payroll
  # - Platform roles = READ-ONLY for org data, CAN access employee/payroll reads
  # - Each role scoped to its business function
  # ============================================================================
  roles:
    # ==========================================================================
    # SPECIAL ROLES
    # ==========================================================================

    EMERGENCY_ACCESS:
      description: "Emergency break-glass access (time-limited)"
      level: 999
      category: "special"
      scope: "platform"
      permissions:
        - "ADMIN_ACCESS"
        - "USER_MANAGE"
        - "ORGANIZATION_MANAGE"
        - "PROPERTY_MANAGE"
        - "LEASE_MANAGE"
        - "TENANT_MANAGE"
        - "PAYMENT_MANAGE"
        - "MAINTENANCE_MANAGE"
        - "INVOICE_MANAGE"
        - "EMPLOYEE_MANAGE"
        - "PAYROLL_MANAGE"
        - "REPORT_FULL"
        - "SYSTEM_ADMIN"
        - "AUDIT_LOG_READ"
        - "AUDIT_LOG_EXPORT"
      capabilities:
        emergencyAccess: true
        fullSystemAccess: true
        bypassRestrictions: true
      restrictions:
        requireMFA: true
        auditAllActions: true
        maxSessionDuration: 3600

    # ==========================================================================
    # PLATFORM ROLES - Oversee platform, READ-ONLY for org data,
    #                   CAN access employee/payroll reads
    # ==========================================================================

    PLATFORM_OVERSIGHT:
      description: "Platform oversight - monitors all organizations (READ-ONLY for org data, can read employee/payroll)"
      level: 1000
      category: "platform"
      scope: "platform"
      permissions:
        # === Core Access ===
        - "ADMIN_ACCESS"

        # === User Management (Full) ===
        - "USER_MANAGE"
        - "USER_INVITE"

        # === Organization (READ-ONLY) ===
        - "ORGANIZATION_READ"
        - "ORGANIZATION_LIST"
        - "ORGANIZATION_LIST_ALL"

        # === Properties (READ-ONLY) ===
        - "PROPERTY_READ"
        - "PROPERTY_LIST"

        # === Leases (READ-ONLY) ===
        - "LEASE_READ"
        - "LEASE_LIST"

        # === Tenants (READ-ONLY) ===
        - "TENANT_READ"
        - "TENANT_LIST"

        # === Payments (READ-ONLY) ===
        - "PAYMENT_READ"
        - "PAYMENT_LIST"

        # === Maintenance (READ-ONLY) ===
        - "MAINTENANCE_READ"
        - "MAINTENANCE_LIST"

        # === Invoices (READ-ONLY) ===
        - "INVOICE_READ"
        - "INVOICE_LIST"

        # === Employee (READ — platform can view employee data) ===
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"

        # === Payroll (READ — platform can view payroll data) ===
        - "PAYROLL_READ"
        - "PAYROLL_LIST"

        # === Reporting (Full) ===
        - "REPORT_FULL"

        # === Analytics (Full) ===
        - "ANALYTICS_READ"
        - "ANALYTICS_ANALYZE"
        - "ANALYTICS_EXPORT"

        # === Dashboard ===
        - "DASHBOARD_READ"
        - "DASHBOARD_VIEW"
        - "DASHBOARD_READ_PLATFORM_DASHBOARD"
        - "DASHBOARD_READ_OVERSIGHT_DASHBOARD"

        # === Session Management ===
        - "SESSION_LIST"
        - "SESSION_TERMINATE"
        - "SESSION_LIST_ALL"
        - "SESSION_CONFIGURE"
        - "SESSION_TERMINATE_ALL"

        # === System (Full) ===
        - "SYSTEM_ADMIN"

        # === Audit (Full) ===
        - "AUDIT_LOG_READ"
        - "AUDIT_LOG_EXPORT"

        # === Notifications ===
        - "NOTIFICATION_READ"
        - "NOTIFICATION_SEND"
        - "NOTIFICATION_LIST"

        # === Vendors (READ-ONLY) ===
        - "VENDOR_READ"
        - "VENDOR_LIST"

        # === Tasks (READ-ONLY) ===
        - "TASK_READ"
        - "TASK_LIST"

        # === Contacts (MANAGE — platform oversight reviews contact submissions) ===
        - "CONTACT_MANAGE"

        # === Documents (READ-ONLY) ===
        - "DOCUMENT_READ"
        - "DOCUMENT_LIST"
        - "DOCUMENT_DOWNLOAD"

        # === Rental Applications (READ + decision) ===
        - "RENTAL_APPLICATION_LIST"
        - "RENTAL_APPLICATION_READ"
        - "RENTAL_APPLICATION_APPROVE"
        - "RENTAL_APPLICATION_REJECT"
        - "RENTAL_APPLICATION_REVIEW"

        # === Assets (READ-ONLY) ===
        - "ASSET_READ"
        - "ASSET_LIST"

      explicitDenials:
        - "ORGANIZATION_CREATE"
        - "ORGANIZATION_UPDATE"
        - "ORGANIZATION_DELETE"
        - "ORGANIZATION_CONFIGURE"
        - "ORGANIZATION_MANAGE"
        - "PROPERTY_CREATE"
        - "PROPERTY_UPDATE"
        - "PROPERTY_DELETE"
        - "PROPERTY_MANAGE"
        - "EMPLOYEE_CREATE"
        - "EMPLOYEE_UPDATE"
        - "EMPLOYEE_DELETE"
        - "PAYROLL_CREATE"
        - "PAYROLL_UPDATE"
        - "PAYROLL_DELETE"
        - "PAYROLL_PROCESS"
        - "PAYROLL_APPROVE"

      bypass_all_checks: true

      capabilities:
        emergencyAccess: true
        fullSystemAccess: false
        bypassRestrictions: false
        canManageOrganizations: false

      restrictions:
        requireMFA: true
        auditAllActions: true
        cannotDeleteSelf: true

    PLATFORM_OPERATIONS:
      description: "Platform operations - manage organizations, can read employee/payroll"
      level: 970
      category: "platform"
      scope: "platform"
      permissions:
        - "ORGANIZATION_MANAGE"
        - "USER_MANAGE"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"
        - "PAYROLL_READ"
        - "PAYROLL_LIST"
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "REPORT_EXPORT"
        - "SYSTEM_MONITOR"
        - "DASHBOARD_READ_PLATFORM_DASHBOARD"

    PLATFORM_ENGINEERING:
      description: "System operations and infrastructure"
      level: 950
      category: "platform"
      scope: "platform"
      permissions:
        - "SYSTEM_ADMIN"
        - "AUDIT_LOG_READ"

    PLATFORM_ANALYTICS:
      description: "Business intelligence and analytics (can read employee/payroll for reporting)"
      level: 930
      category: "platform"
      scope: "platform"
      permissions:
        - "REPORT_FULL"
        - "ANALYTICS_READ"
        - "ANALYTICS_ANALYZE"
        - "ANALYTICS_EXPORT"
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"
        - "PAYROLL_READ"
        - "PAYROLL_LIST"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "DASHBOARD_READ_PLATFORM_DASHBOARD"
      restrictions:
        readOnly: true

    # ==========================================================================
    # PORTFOLIO LEVEL - Manages MULTIPLE organizations
    # This is the primary business-operations role with full access
    # Portfolio owners are investors/operators managing multiple properties
    # across multiple organizations — they need employee & payroll access
    # ==========================================================================

    PORTFOLIO_OWNER:
      description: "Multi-organization portfolio manager — full business operations across all owned organizations"
      level: 920
      category: "portfolio"
      scope: "portfolio"
      permissions:
        # === Organization (Read + Update, not Create/Delete — that's platform ops) ===
        - "ORGANIZATION_READ"
        - "ORGANIZATION_UPDATE"
        - "ORGANIZATION_LIST"
        - "ORGANIZATION_CONFIGURE"

        # === User Management (Full within orgs) ===
        - "USER_MANAGE"
        - "USER_INVITE"

        # === Property Management (Full) ===
        - "PROPERTY_MANAGE"

        # === Lease Management (Full) ===
        - "LEASE_MANAGE"

        # === Tenant Management (Full) ===
        - "TENANT_MANAGE"

        # === Payment Management (Full) ===
        - "PAYMENT_MANAGE"

        # === Maintenance Management (Full) ===
        - "MAINTENANCE_MANAGE"

        # === Invoice Management (Full) ===
        - "INVOICE_MANAGE"

        # === Employee Management (Full — manages staff across orgs) ===
        - "EMPLOYEE_MANAGE"

        # === Payroll Management (Full — processes payroll across orgs) ===
        - "PAYROLL_MANAGE"

        # === Reporting (Full) ===
        - "REPORT_FULL"

        # === Analytics ===
        - "ANALYTICS_READ"
        - "ANALYTICS_ANALYZE"
        - "ANALYTICS_EXPORT"

        # === Dashboard ===
        - "DASHBOARD_READ"
        - "DASHBOARD_VIEW"
        - "DASHBOARD_READ_PORTFOLIO_DASHBOARD"
        - "DASHBOARD_READ_MANAGER"

        # === Audit ===
        - "AUDIT_LOG_READ"
        - "AUDIT_LOG_EXPORT"

        # === Notifications ===
        - "NOTIFICATION_READ"
        - "NOTIFICATION_SEND"
        - "NOTIFICATION_LIST"

        # === Vendor Management (Full) ===
        - "VENDOR_MANAGE"

        # === Task Management (Full) ===
        - "TASK_MANAGE"

        # === Contact Management (Full) ===
        - "CONTACT_MANAGE"

        # === Document Management (Full) ===
        - "DOCUMENT_MANAGE"

      explicitDenials:
        - "ORGANIZATION_CREATE"
        - "ORGANIZATION_DELETE"
        - "SYSTEM_ADMIN"

      capabilities:
        emergencyAccess: false
        fullSystemAccess: false
        canManageOrganizations: true

    # ==========================================================================
    # ORGANIZATION LEVEL - Owns/manages a SINGLE organization
    # Organization Owner is a landlord — manages their properties, tenants,
    # leases, maintenance. Does NOT manage employees or payroll (that's
    # portfolio-level for multi-org operators).
    # ==========================================================================

    ORGANIZATION_OWNER:
      description: "Single organization owner/landlord — property & tenant management, NO employee/payroll"
      level: 900
      category: "organization"
      scope: "organization"
      permissions:
        # === Organization (own org only) ===
        - "ORGANIZATION_READ"
        - "ORGANIZATION_UPDATE"
        - "ORGANIZATION_CONFIGURE"

        # === User Management (within their org) ===
        - "USER_MANAGE"
        - "USER_INVITE"

        # === Property Management (Full) ===
        - "PROPERTY_MANAGE"

        # === Lease Management (Full) ===
        - "LEASE_MANAGE"

        # === Tenant Management (Full) ===
        - "TENANT_MANAGE"

        # === Payment (VIEW ONLY — landlord monitors payments) ===
        - "PAYMENT_READ"
        - "PAYMENT_LIST"

        # === Maintenance Management (Full) ===
        - "MAINTENANCE_MANAGE"

        # === Invoice (VIEW ONLY) ===
        - "INVOICE_READ"
        - "INVOICE_LIST"

        # === Reporting (Generate & View) ===
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "REPORT_EXPORT"

        # === Dashboard ===
        - "DASHBOARD_READ"
        - "DASHBOARD_VIEW"
        - "DASHBOARD_READ_MANAGER"

        # === Audit (own org) ===
        - "AUDIT_LOG_READ"

        # === Notifications ===
        - "NOTIFICATION_READ"
        - "NOTIFICATION_LIST"

        # === Vendor Management (Full — manages vendors for maintenance) ===
        - "VENDOR_MANAGE"

        # === Task Management (Full) ===
        - "TASK_MANAGE"

        # === Contact (Read submissions) ===
        - "CONTACT_MANAGE"

        # === Document (Full) ===
        - "DOCUMENT_MANAGE"

      explicitDenials:
        - "EMPLOYEE_CREATE"
        - "EMPLOYEE_UPDATE"
        - "EMPLOYEE_DELETE"
        - "EMPLOYEE_MANAGE"
        - "PAYROLL_CREATE"
        - "PAYROLL_UPDATE"
        - "PAYROLL_DELETE"
        - "PAYROLL_PROCESS"
        - "PAYROLL_APPROVE"
        - "PAYROLL_MANAGE"
        - "ORGANIZATION_CREATE"
        - "ORGANIZATION_DELETE"

    ORGANIZATION_ADMIN:
      description: "Organization administrator — day-to-day operations"
      level: 850
      category: "organization"
      scope: "organization"
      permissions:
        - "ORGANIZATION_READ"
        - "USER_CREATE"
        - "USER_READ"
        - "USER_UPDATE"
        - "USER_LIST"
        - "USER_INVITE"
        - "PROPERTY_MANAGE"
        - "LEASE_MANAGE"
        - "TENANT_MANAGE"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "MAINTENANCE_MANAGE"
        - "INVOICE_MANAGE"
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "DASHBOARD_READ_MANAGER"
        - "NOTIFICATION_READ"
        - "NOTIFICATION_LIST"
        - "VENDOR_MANAGE"
        - "TASK_MANAGE"
        - "CONTACT_MANAGE"
        - "DOCUMENT_MANAGE"

      explicitDenials:
        - "EMPLOYEE_MANAGE"
        - "PAYROLL_MANAGE"
        - "ORGANIZATION_DELETE"

    # ==========================================================================
    # FUNCTIONAL SPECIALIST ROLES
    # ==========================================================================

    PROPERTY_MANAGER:
      description: "Property portfolio manager — properties, leases, tenants, maintenance"
      level: 800
      category: "organization"
      scope: "organization"
      permissions:
        - "PROPERTY_MANAGE"
        - "LEASE_MANAGE"
        - "TENANT_MANAGE"
        - "MAINTENANCE_MANAGE"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "INVOICE_CREATE"
        - "INVOICE_READ"
        - "INVOICE_SEND"
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "DASHBOARD_READ_MANAGER"
        - "VENDOR_MANAGE"
        - "TASK_MANAGE"
        - "NOTIFICATION_READ"
        - "NOTIFICATION_LIST"
        - "DOCUMENT_MANAGE"

    LEASE_SPECIALIST:
      description: "Lease agreements and contract management"
      level: 750
      category: "organization"
      scope: "team"
      permissions:
        - "LEASE_MANAGE"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "TENANT_READ"
        - "TENANT_LIST"
        - "DOCUMENT_READ"
        - "DOCUMENT_UPLOAD"
        - "DOCUMENT_DOWNLOAD"

    LEASING_AGENT:
      description: "Tenant acquisition and leasing operations"
      level: 700
      category: "organization"
      scope: "team"
      permissions:
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "LEASE_CREATE"
        - "LEASE_READ"
        - "LEASE_UPDATE"
        - "LEASE_LIST"
        - "TENANT_MANAGE"
        - "INVOICE_CREATE"
        - "INVOICE_READ"
        - "DASHBOARD_READ_LEASING_DASHBOARD"

    ACCOUNTANT:
      description: "Financial operations — payments, invoices, payroll reads"
      level: 650
      category: "organization"
      scope: "team"
      permissions:
        - "PAYMENT_MANAGE"
        - "INVOICE_MANAGE"
        - "PAYROLL_READ"
        - "PAYROLL_LIST"
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "REPORT_EXPORT"
        - "DASHBOARD_READ_FINANCIAL_DASHBOARD"
        - "AUDIT_LOG_READ"
        - "AUDIT_LOG_EXPORT"

    MAINTENANCE_SUPERVISOR:
      description: "Maintenance operations supervisor"
      level: 600
      category: "organization"
      scope: "team"
      permissions:
        - "MAINTENANCE_MANAGE"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"
        - "DASHBOARD_READ_MAINTENANCE_DASHBOARD"

    TENANT_COORDINATOR:
      description: "Tenant relations and communication"
      level: 550
      category: "organization"
      scope: "team"
      permissions:
        - "TENANT_READ"
        - "TENANT_UPDATE"
        - "TENANT_LIST"
        - "TENANT_COMMUNICATE"
        - "LEASE_READ"
        - "LEASE_LIST"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "MAINTENANCE_READ"
        - "MAINTENANCE_CREATE"
        - "NOTIFICATION_READ"
        - "NOTIFICATION_SEND"

    # ==========================================================================
    # TEAM ROLES
    # ==========================================================================

    TEAM_LEAD:
      description: "Team or department lead"
      level: 500
      category: "organization"
      scope: "team"
      permissions:
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "TENANT_READ"
        - "TENANT_LIST"
        - "LEASE_READ"
        - "LEASE_LIST"
        - "MAINTENANCE_READ"
        - "MAINTENANCE_LIST"
        - "MAINTENANCE_ASSIGN"
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"
        - "REPORT_READ"
        - "DASHBOARD_READ_MANAGER"

    INSPECTOR:
      description: "Property inspection specialist"
      level: 450
      category: "operational"
      scope: "team"
      permissions:
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "MAINTENANCE_READ"
        - "MAINTENANCE_CREATE"
        - "MAINTENANCE_UPDATE"
        - "DOCUMENT_READ"
        - "DOCUMENT_UPLOAD"

    # ==========================================================================
    # OPERATIONAL ROLES
    # ==========================================================================

    MAINTENANCE_TECHNICIAN:
      description: "Maintenance work execution"
      level: 400
      category: "operational"
      scope: "team"
      permissions:
        - "MAINTENANCE_READ"
        - "MAINTENANCE_UPDATE"
        - "MAINTENANCE_COMPLETE"
        - "PROPERTY_READ"

    TEAM_MEMBER:
      description: "General team member"
      level: 300
      category: "operational"
      scope: "team"
      permissions:
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "TENANT_READ"
        - "TENANT_LIST"
        - "MAINTENANCE_READ"
        - "MAINTENANCE_LIST"
        - "DASHBOARD_VIEW"

    # ==========================================================================
    # EXTERNAL ROLES
    # ==========================================================================

    VENDOR:
      description: "External vendor portal access"
      level: 200
      category: "external"
      scope: "self"
      permissions:
        - "MAINTENANCE_READ"
        - "MAINTENANCE_UPDATE"
        - "INVOICE_CREATE"
        - "INVOICE_READ"

    TENANT:
      description: "Tenant self-service portal"
      level: 150
      category: "external"
      scope: "self"
      permissions:
        - "TENANT_READ"
        - "TENANT_UPDATE"
        - "PAYMENT_CREATE"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "LEASE_READ"
        - "LEASE_LIST"
        - "MAINTENANCE_CREATE"
        - "MAINTENANCE_READ"
        - "MAINTENANCE_LIST"
        - "PROPERTY_READ"
        - "DOCUMENT_READ"
        - "DOCUMENT_UPLOAD"
        - "DOCUMENT_DOWNLOAD"
        - "NOTIFICATION_READ"
        - "DASHBOARD_VIEW"
        - "DASHBOARD_PORTAL"

    APPLICANT:
      description: "Rental application submission"
      level: 100
      category: "external"
      scope: "self"
      permissions:
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "LEASE_READ"
        - "DOCUMENT_UPLOAD"
        - "DOCUMENT_READ"

    READ_ONLY:
      description: "Read-only observer / auditor"
      level: 50
      category: "external"
      scope: "self"
      permissions:
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "LEASE_READ"
        - "LEASE_LIST"
        - "TENANT_READ"
        - "TENANT_LIST"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "MAINTENANCE_READ"
        - "MAINTENANCE_LIST"
        - "EMPLOYEE_READ"
        - "EMPLOYEE_LIST"
        - "PAYROLL_READ"
        - "PAYROLL_LIST"
        - "DASHBOARD_VIEW"
      restrictions:
        readOnly: true

  # ============================================================================
  # ENDPOINT MAPPINGS (Optional - for API Gateway)
  # ============================================================================
  endpoints:
    "/api/v1/users":
      GET: "USER_LIST"
      POST: "USER_CREATE"
    "/api/v1/users/{id}":
      GET: "USER_READ"
      PUT: "USER_UPDATE"
      DELETE: "USER_DELETE"
    "/api/v1/organizations":
      GET: "ORGANIZATION_LIST"
      POST: "ORGANIZATION_CREATE"
    "/api/v1/organizations/{id}":
      GET: "ORGANIZATION_READ"
      PUT: "ORGANIZATION_UPDATE"
      DELETE: "ORGANIZATION_DELETE"
    "/api/v1/properties":
      GET: "PROPERTY_LIST"
      POST: "PROPERTY_CREATE"
    "/api/v1/properties/{id}":
      GET: "PROPERTY_READ"
      PUT: "PROPERTY_UPDATE"
      DELETE: "PROPERTY_DELETE"

  # ============================================================================
  # TIME RESTRICTIONS - Restrict access by time-of-day and day-of-week
  # ============================================================================
  timeRestrictions:
    MAINTENANCE_TECHNICIAN:
      activeHours: "06:00-22:00"
      activeDays: ["MON", "TUE", "WED", "THU", "FRI", "SAT"]
      timezone: "America/New_York"
    LEASING_AGENT:
      activeHours: "08:00-20:00"
      activeDays: ["MON", "TUE", "WED", "THU", "FRI", "SAT"]
      timezone: "America/New_York"
    ACCOUNTANT:
      activeHours: "07:00-19:00"
      activeDays: ["MON", "TUE", "WED", "THU", "FRI"]
      timezone: "America/New_York"

  # ============================================================================
  # FIELD-LEVEL PERMISSIONS - Control which fields are visible per role
  # ============================================================================
  fieldLevelPermissions:
    tenant:
      PLATFORM_OVERSIGHT:
        visible:
          [
            "name",
            "email",
            "phone",
            "lease_info",
            "payment_status",
            "ssn",
            "bank_account",
            "credit_score",
          ]
      ORGANIZATION_OWNER:
        visible:
          [
            "name",
            "email",
            "phone",
            "lease_info",
            "payment_status",
            "credit_score",
          ]
        hidden: ["ssn", "bank_account"]
      PROPERTY_MANAGER:
        visible: ["name", "email", "phone", "lease_info", "payment_status"]
        hidden: ["ssn", "bank_account", "credit_score"]
      LEASING_AGENT:
        visible: ["name", "email", "phone", "rental_application"]
        hidden: ["ssn", "bank_account", "payment_history", "credit_score"]
      ACCOUNTANT:
        visible: ["name", "payment_status", "balance", "payment_history"]
        hidden: ["ssn", "credit_score", "phone"]
      MAINTENANCE_TECHNICIAN:
        visible: ["name", "phone", "unit_number"]
        hidden:
          [
            "ssn",
            "bank_account",
            "credit_score",
            "payment_status",
            "payment_history",
            "email",
          ]
    property:
      PLATFORM_OVERSIGHT:
        visible:
          [
            "address",
            "name",
            "units",
            "status",
            "purchase_price",
            "current_value",
            "private_notes",
            "target_rent",
          ]
      ORGANIZATION_OWNER:
        visible:
          [
            "address",
            "name",
            "units",
            "status",
            "purchase_price",
            "current_value",
            "private_notes",
            "target_rent",
          ]
      PROPERTY_MANAGER:
        visible:
          ["address", "name", "units", "status", "target_rent", "private_notes"]
        hidden: ["purchase_price", "current_value"]
      LEASING_AGENT:
        visible: ["address", "name", "units", "status", "availability"]
        hidden:
          ["purchase_price", "current_value", "private_notes", "target_rent"]
      ACCOUNTANT:
        visible:
          ["address", "name", "purchase_price", "current_value", "rent_roll"]
        hidden: ["private_notes", "target_rent"]
      MAINTENANCE_TECHNICIAN:
        visible: ["address", "name", "units", "condition"]
        hidden:
          ["purchase_price", "current_value", "private_notes", "target_rent"]

  # ============================================================================
  # DATA SCOPES - Row-Level Security (which records a role can access)
  # ============================================================================
  dataScopes:
    PROPERTY_MANAGER:
      property: "assigned_portfolio"
      tenant: "own_properties"
      maintenance: "own_properties"
      lease: "own_properties"
    LEASING_AGENT:
      property: "own_region"
      tenant: "own_region"
      lease: "own_properties"
    MAINTENANCE_SUPERVISOR:
      property: "own_properties"
      maintenance: "own_properties"
    MAINTENANCE_TECHNICIAN:
      maintenance: "self_only"
      property: "own_properties"
    ACCOUNTANT:
      payment: "own_organization"
      invoice: "own_organization"
    TENANT:
      lease: "self_only"
      payment: "self_only"
      maintenance: "self_only"

  # ============================================================================
  # CONDITIONAL PERMISSIONS - Amount and value limits per role
  # ============================================================================
  conditionalPermissions:
    PROPERTY_MANAGER:
      "payment:approve":
        max_amount: 5000
      "maintenance:approve":
        max_cost: 2500
    ORGANIZATION_ADMIN:
      "payment:approve":
        max_amount: 25000
        requires_secondary_approval_above: 10000
    MAINTENANCE_SUPERVISOR:
      "maintenance:approve":
        max_cost: 10000
    ACCOUNTANT:
      "payment:approve":
        max_amount: 10000

  # ============================================================================
  # DYNAMIC ROLE COMPOSITION - Context-based role activation
  # ============================================================================
  dynamicRoleComposition:
    ORGANIZATION_OWNER:
      activateWhen:
        org_status: "ACTIVE"
        user_verified: true
      additionalRoles:
        - "FINANCIAL_ANALYST"
    PORTFOLIO_OWNER:
      conditions:
        subscription_plan: ["PREMIUM", "ENTERPRISE"]
      additionalRoles:
        - "ANALYTICS_VIEWER"
