    workflow:
      category: "automation"
      actions:
        ["create", "read", "update", "delete", "execute", "schedule", "list"]
      ownerField: "organizationId"
      allowedScopes: ["organization", "team"]

  # ============================================================================
  # ROLE PROFILES - Template-based role definitions
  # ============================================================================
  roleProfiles:
    # ========================================
    # PLATFORM ROLES
    # ========================================
    platform_oversight:
      description: "Platform-wide oversight and approval authority"
      scope: "platform"
      category: "platform"
      level: 1000
      resourcePermissions:
        onboarding: { template: "onboarding_approver" }
        organization:
          {
            template: "organization_viewer",
            additionalPermissions: ["suspend", "activate"],
          }
        user:
          {
            template: "user_viewer",
            additionalPermissions: ["suspend", "activate"],
          }
        system:
          { template: "system_monitor", additionalPermissions: ["configure"] }
        audit_log: { template: "audit_analyst" }
        report: { template: "report_administrator" }
        role: { template: "role_viewer" }
        property:
          { template: "property_viewer", additionalPermissions: ["export"] }
        lease: { template: "read_only" }
        tenant: { template: "tenant_viewer" }
        rental_application:
          { template: "read_only", additionalPermissions: ["export"] }
        payment:
          { template: "financial_read", additionalPermissions: ["approve"] }
        invoice: { template: "read_only", additionalPermissions: ["approve"] }
        document: { template: "document_viewer" }
      capabilities:
        - approvalAuthority
        - crossOrganizationView
        - systemMonitoring
        - viewAllAuditLogs
        - suspendOrganizations
        - emergencyAccess
        - bypassReadRestrictions
      restrictions:
        requireMFA: true
        requireHardwareKey: true
        ipWhitelist: true
        sessionTimeout: 900
        auditAllActions: true
        oversightOnly: true
        cannotDeleteSelf: true
        cannotCreateHigherRole: true

    platform_operations:
      description: "Platform operations and organization management"
      scope: "platform"
      category: "platform"
      level: 970
      resourcePermissions:
        organization:
          {
            template: "organization_manager",
            additionalPermissions: ["create", "transfer"],
          }
        onboarding: { template: "onboarding_processor" }
        user: { template: "user_manager" }
        role: { template: "role_manager" }
        notification: { template: "notification_management" }
        document: { template: "document_administrator" }
        report: { template: "report_administrator" }
        audit_log:
          { template: "audit_viewer", additionalPermissions: ["export"] }
        property:
          { template: "property_viewer", additionalPermissions: ["export"] }
        lease: { template: "read_only" }
        tenant: { template: "tenant_viewer" }
        rental_application:
          { template: "read_only", additionalPermissions: ["export", "track"] }
        payment: { template: "financial_read" }
        invoice: { template: "read_only" }
        asset: { template: "asset_viewer" }
        vendor: { template: "vendor_viewer" }
        maintenance: { template: "maintenance_viewer" }
      capabilities:
        - organizationManagement
        - onboardingManagement
        - userManagement
        - roleManagement
        - customerSuccess
        - crossOrganizationView
        - organizationSetup
        - supportAccess
      restrictions:
        requireMFA: true
        sessionTimeout: 1800
        requireApprovalForActivation: true
        requireApprovalForDeletion: true
        auditAllActions: true
        cannotDeleteSelf: true
        cannotCreateHigherRole: true

    platform_engineering:
      description: "System operations and infrastructure"
