        - "milestone:track"
        - "rental_application:create"
        - "rental_application:read"
        - "rental_application:update"
        - "rental_application:review"
        - "rental_application:approve"
        - "rental_application:reject"
        - "rental_application:delete"
        - "rental_application:list"
        - "rental_application:manage"

    PROPERTY_MANAGER:
      description: "Property management and operations"
      level: 700
      category: "organization"
      scope: "organization"
      permissions:
        - "organization:read"
        - "organization:list"
        - "user:read"
        - "user:list"
