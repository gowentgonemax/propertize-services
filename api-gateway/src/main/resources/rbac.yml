          "create",
          "read",
          "update",
          "delete",
          "schedule",
          "complete",
          "list",
          "approve",
        ]
      ownerField: "propertyId"
      allowedScopes: ["portfolio", "organization", "team"]
      relationships:
        belongsTo: ["property"]

    user:
      category: "administration"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "invite",
          "suspend",
          "activate",
          "list",
          "export",
        ]
      ownerField: "organizationId"
      piiFields: ["email", "phone", "ssn", "address"]
      allowedScopes: ["platform", "portfolio", "organization"]
      auditRequired: true

    organization:
      category: "administration"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "configure",
          "suspend",
          "activate",
          "list",
          "transfer",
          "manage",
        ]
      ownerField: "ownerUserId"
      allowedScopes: ["platform", "portfolio", "organization"]
      auditRequired: true
      relationships:
        hasMany: ["user", "property", "tenant"]

    report:
      category: "analytics"
      actions: ["generate", "read", "export", "schedule", "list", "customize"]
      ownerField: "organizationId"
      allowedScopes: ["platform", "portfolio", "organization", "team"]

    asset:
      category: "operations"
      actions:
        ["create", "read", "update", "delete", "track", "list", "depreciate"]
      ownerField: "propertyId"
      allowedScopes: ["portfolio", "organization", "team"]
      relationships:
        belongsTo: ["property"]

    vendor:
      category: "operations"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "rate",
          "list",
          "contract",
          "pay",
        ]
      ownerField: "organizationId"
      allowedScopes: ["portfolio", "organization", "team"]

    notification:
      category: "communication"
      actions: ["create", "read", "send", "schedule", "list", "configure"]
      ownerField: "organizationId"
      allowedScopes: ["portfolio", "organization", "team"]

    utility:
      category: "financial"
      actions: ["create", "read", "update", "track", "list", "reconcile"]
      ownerField: "propertyId"
      allowedScopes: ["portfolio", "organization", "team"]

    task:
      category: "operations"
      actions:
        ["create", "read", "update", "delete", "list", "assign", "complete"]
      ownerField: "organizationId"
      allowedScopes: ["portfolio", "organization", "team"]

    schedule:
      category: "operations"
      actions: ["create", "read", "update", "delete", "list", "availability"]
      ownerField: "organizationId"
      allowedScopes: ["portfolio", "organization", "team"]

    milestone:
      category: "analytics"
      actions: ["create", "read", "update", "delete", "list", "track"]
      ownerField: "organizationId"
      allowedScopes: ["portfolio", "organization", "team"]

    contact:
      category: "operations"
      actions:
        ["create", "read", "update", "delete", "manage", "list", "export"]
      ownerField: "organizationId"
      allowedScopes: ["portfolio", "organization", "team"]

    system:
      category: "platform"
      actions:
        ["configure", "monitor", "backup", "restore", "update", "troubleshoot"]
      ownerField: "platform"
      allowedScopes: ["platform"]
      auditRequired: true

    audit_log:
      category: "compliance"
      actions: ["read", "export", "analyze"]
      ownerField: "platform"
      allowedScopes: ["platform", "organization"]
      immutable: true

    onboarding:
      category: "platform"
      actions:
        [
          "create",
          "read",
          "update",
          "delete",
          "submit",
          "approve",
          "reject",
          "list",
          "export",
        ]
      ownerField: "platform"
      allowedScopes: ["platform"]
      auditRequired: true
      requiresApproval: true
      piiFields: ["contactEmail", "contactPhone", "ownerEmail", "ownerPhone"]

    role:
      category: "administration"
      actions:
        ["create", "read", "update", "delete", "assign", "revoke", "list"]
      ownerField: "organizationId"
      allowedScopes: ["platform", "portfolio", "organization"]
