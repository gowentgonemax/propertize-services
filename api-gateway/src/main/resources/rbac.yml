rbac:
  version: "5.0"
  lastUpdated: "2025-12-18"

  # ============================================================================
  # CORE CONFIGURATION
  # ============================================================================
  core:
    defaultScope: "self"
    enableInheritance: true
    enableDynamicPermissions: true
    enableRoleComposition: true
    enablePermissionTemplates: true
    cachePermissions: true
    cacheTTL: 3600
    allowRuntimeRoleCreation: true
    maxCustomRolesPerClient: 50

  # ============================================================================
  # PERMISSION TEMPLATES - Reusable permission sets
  # Single point of change for common permission patterns
  # ============================================================================
  permissionTemplates:
    # ========================================
    # BASIC ACCESS TEMPLATES
    # ========================================
    full_crud:
      permissions: ["create", "read", "update", "delete"]
      description: "Complete create, read, update, delete access"

    read_only:
      permissions: ["read", "list"]
      description: "View and list items only"

    create_read:
      permissions: ["create", "read", "list"]
      description: "Create new items and view existing"

    update_read:
      permissions: ["read", "update", "list"]
      description: "Update existing items and view"

    # ========================================
    # MANAGEMENT TEMPLATES
    # ========================================
    basic_management:
      permissions: ["create", "read", "update", "list"]
      description: "Manage without deletion capability"

    full_management:
      permissions: ["create", "read", "update", "delete", "list", "export"]
      description: "Complete management with export"

    administrative:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "list",
          "export",
          "manage",
          "configure",
        ]
      description: "Full administrative control"

    # ========================================
    # OPERATIONAL TEMPLATES
    # ========================================
    operational:
      permissions: ["read", "update", "list", "track"]
      description: "Day-to-day operations and tracking"

    supervisory:
      permissions: ["read", "list", "approve", "reject", "review"]
      description: "Oversight and approval without modification"

    execution:
      permissions: ["read", "update", "complete"]
      description: "Task execution without creation"

    assignment:
      permissions: ["read", "list", "assign", "schedule"]
      description: "Assign and schedule work"

    # ========================================
    # FINANCIAL TEMPLATES
    # ========================================
    financial_read:
      permissions: ["read", "list", "export"]
      description: "View financial data"

    financial_operations:
      permissions: ["create", "read", "list", "track"]
      description: "Process financial transactions"

    financial_management:
      permissions:
        ["create", "read", "update", "list", "approve", "export", "reconcile"]
      description: "Manage financial operations with approval"

    financial_oversight:
      permissions: ["read", "list", "approve", "reject", "export", "reconcile"]
      description: "Financial approval and oversight"

    payment_processing:
      permissions: ["create", "read", "process", "track", "list"]
      description: "Process payments and track status"

    billing_management:
      permissions: ["create", "read", "update", "send", "list", "export"]
      description: "Manage invoices and billing"

    # ========================================
    # COMMUNICATION TEMPLATES
    # ========================================
    communication:
      permissions: ["read", "send", "create", "list"]
      description: "Communication capabilities"

    notification_management:
      permissions: ["create", "read", "send", "schedule", "list", "configure"]
      description: "Full notification control"

    messaging:
      permissions: ["read", "send", "list"]
      description: "Send and receive messages"

    # ========================================
    # DOCUMENT TEMPLATES
    # ========================================
    document_viewer:
      permissions: ["read", "list", "download"]
      description: "View and download documents"

    document_contributor:
      permissions: ["upload", "read", "list", "download"]
      description: "Upload and view documents"

    document_manager:
      permissions:
        ["upload", "read", "update", "delete", "share", "list", "download"]
      description: "Full document management"

    document_administrator:
      permissions:
        [
          "upload",
          "read",
          "update",
          "delete",
          "share",
          "list",
          "download",
          "sign",
          "configure",
        ]
      description: "Complete document control with signing"

    # ========================================
    # PROPERTY & LEASE TEMPLATES
    # ========================================
    property_viewer:
      permissions: ["read", "list"]
      description: "View property information"

    property_manager:
      permissions: ["create", "read", "update", "list", "export"]
      description: "Manage properties without deletion"

    property_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "manage",
          "list",
          "export",
          "archive",
          "transfer",
        ]
      description: "Complete property control"

    lease_processor:
      permissions: ["create", "read", "update", "list"]
      description: "Process lease agreements"

    lease_manager:
      permissions:
        ["create", "read", "update", "terminate", "renew", "list", "export"]
      description: "Full lease lifecycle management"

    lease_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "terminate",
          "renew",
          "list",
          "approve",
          "export",
        ]
      description: "Complete lease control with approval"

    # ========================================
    # TENANT & APPLICATION TEMPLATES
    # ========================================
    tenant_viewer:
      permissions: ["read", "list"]
      description: "View tenant information"

    tenant_coordinator:
      permissions: ["create", "read", "update", "list", "communicate"]
      description: "Manage tenant relationships"

    tenant_manager:
      permissions:
        ["create", "read", "update", "list", "communicate", "export", "screen"]
      description: "Full tenant management"

    tenant_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "manage",
          "communicate",
          "list",
          "export",
          "screen",
        ]
      description: "Complete tenant control"

    application_processor:
      permissions: ["create", "read", "update", "list", "review"]
      description: "Process rental applications"

    application_manager:
      permissions:
        ["create", "read", "update", "list", "review", "track", "manage"]
      description: "Manage application workflow"

    application_approver:
      permissions: ["read", "list", "review", "approve", "reject", "track"]
      description: "Review and approve applications"

    application_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "submit",
          "approve",
          "reject",
          "review",
          "manage",
          "list",
          "export",
          "track",
        ]
      description: "Complete application control"

    # ========================================
    # MAINTENANCE & INSPECTION TEMPLATES
    # ========================================
    maintenance_viewer:
      permissions: ["read", "list"]
      description: "View maintenance tickets"

    maintenance_worker:
      permissions: ["read", "update", "complete"]
      description: "Execute maintenance tasks"

    maintenance_coordinator:
      permissions: ["create", "read", "update", "assign", "list", "schedule"]
      description: "Coordinate maintenance work"

    maintenance_manager:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "assign",
          "complete",
          "list",
          "schedule",
        ]
      description: "Full maintenance management"

    maintenance_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "assign",
          "complete",
          "list",
          "schedule",
          "approve",
        ]
      description: "Complete maintenance control with approval"

    inspection_performer:
      permissions: ["read", "complete"]
      description: "Perform inspections"

    inspection_scheduler:
      permissions: ["create", "read", "update", "schedule", "list"]
      description: "Schedule and manage inspections"

    inspection_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "schedule",
          "complete",
          "list",
          "approve",
        ]
      description: "Complete inspection control"

    # ========================================
    # USER & ORGANIZATION TEMPLATES
    # ========================================
    user_viewer:
      permissions: ["read", "list"]
      description: "View user information"

    user_coordinator:
      permissions: ["invite", "read", "list"]
      description: "Invite users and view info"

    user_manager:
      permissions: ["create", "read", "update", "invite", "list"]
      description: "Manage users without deletion"

    user_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "invite",
          "suspend",
          "activate",
          "list",
          "export",
        ]
      description: "Complete user control"

    organization_viewer:
      permissions: ["read", "list"]
      description: "View organization information"

    organization_manager:
      permissions: ["read", "update", "configure", "list"]
      description: "Manage organization settings"

    organization_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "configure",
          "suspend",
          "activate",
          "list",
          "transfer",
        ]
      description: "Complete organization control"

    # ========================================
    # ROLE & PERMISSION TEMPLATES
    # ========================================
    role_viewer:
      permissions: ["read", "list"]
      description: "View roles and permissions"

    role_assigner:
      permissions: ["read", "assign", "revoke", "list"]
      description: "Assign roles to users"

    role_manager:
      permissions: ["create", "read", "update", "assign", "revoke", "list"]
      description: "Manage custom roles"

    role_administrator:
      permissions:
        ["create", "read", "update", "delete", "assign", "revoke", "list"]
      description: "Complete role control"

    # ========================================
    # REPORTING & ANALYTICS TEMPLATES
    # ========================================
    report_viewer:
      permissions: ["read", "list"]
      description: "View reports"

    report_generator:
      permissions: ["generate", "read", "list"]
      description: "Generate and view reports"

    report_manager:
      permissions: ["generate", "read", "export", "list", "customize"]
      description: "Full reporting capabilities"

    report_administrator:
      permissions:
        ["generate", "read", "export", "schedule", "list", "customize"]
      description: "Complete reporting control"

    analytics_viewer:
      permissions: ["read", "list", "export"]
      description: "View and export analytics"

    analytics_administrator:
      permissions: ["read", "list", "export", "analyze", "customize"]
      description: "Full analytics control"

    # ========================================
    # AUDIT & COMPLIANCE TEMPLATES
    # ========================================
    audit_viewer:
      permissions: ["read", "list"]
      description: "View audit logs"

    audit_analyst:
      permissions: ["read", "list", "export", "analyze"]
      description: "Analyze audit data"

    compliance_reviewer:
      permissions: ["read", "list", "review", "export"]
      description: "Review compliance data"

    # ========================================
    # ASSET & VENDOR TEMPLATES
    # ========================================
    asset_viewer:
      permissions: ["read", "list"]
      description: "View asset information"

    asset_tracker:
      permissions: ["read", "update", "track", "list"]
      description: "Track asset status and location"

    asset_manager:
      permissions: ["create", "read", "update", "delete", "track", "list"]
      description: "Full asset management"

    asset_administrator:
      permissions:
        ["create", "read", "update", "delete", "track", "list", "depreciate"]
      description: "Complete asset control with depreciation"

    vendor_viewer:
      permissions: ["read", "list"]
      description: "View vendor information"

    vendor_coordinator:
      permissions: ["create", "read", "update", "list", "contract"]
      description: "Coordinate vendor relationships"

    vendor_manager:
      permissions:
        ["create", "read", "update", "delete", "rate", "list", "contract"]
      description: "Full vendor management"

    vendor_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "rate",
          "list",
          "contract",
          "pay",
        ]
      description: "Complete vendor control with payment"

    # ========================================
    # WORKFLOW & AUTOMATION TEMPLATES
    # ========================================
    workflow_viewer:
      permissions: ["read", "list"]
      description: "View workflows"

    workflow_executor:
      permissions: ["read", "execute", "list"]
      description: "Execute workflows"

    workflow_manager:
      permissions: ["create", "read", "update", "execute", "list"]
      description: "Manage workflows"

    workflow_administrator:
      permissions:
        ["create", "read", "update", "delete", "execute", "schedule", "list"]
      description: "Complete workflow control"

    # ========================================
    # SYSTEM & PLATFORM TEMPLATES
    # ========================================
    system_monitor:
      permissions: ["monitor", "read"]
      description: "Monitor system health"

    system_operator:
      permissions: ["configure", "monitor", "update"]
      description: "Operate system functions"

    system_administrator:
      permissions:
        ["configure", "monitor", "backup", "restore", "update", "troubleshoot"]
      description: "Complete system control"

    # ========================================
    # ONBOARDING TEMPLATES
    # ========================================
    onboarding_viewer:
      permissions: ["read", "list"]
      description: "View onboarding requests"

    onboarding_processor:
      permissions: ["create", "read", "update", "submit", "list"]
      description: "Process onboarding requests"

    onboarding_approver:
      permissions: ["read", "approve", "reject", "list", "export"]
      description: "Approve onboarding requests"

    onboarding_administrator:
      permissions:
        [
          "create",
          "read",
          "update",
          "delete",
          "submit",
          "approve",
          "reject",
          "list",
          "export",
        ]
      description: "Complete onboarding control"

    # ========================================
    # UTILITY & CONTACT TEMPLATES
    # ========================================
    utility_viewer:
      permissions: ["read", "list"]
      description: "View utility information"

    utility_tracker:
      permissions: ["read", "update", "track", "list"]
      description: "Track utility usage"

    utility_manager:
      permissions: ["create", "read", "update", "track", "list", "reconcile"]
      description: "Full utility management"

    task_assignee:
      permissions: ["read", "update", "list", "complete"]
      description: "Execute assigned tasks"

    task_manager:
      permissions: ["create", "read", "update", "delete", "list", "assign"]
      description: "Full task management"

    schedule_viewer:
      permissions: ["read", "list", "availability"]
      description: "View schedule and check availability"

    schedule_manager:
      permissions:
        ["create", "read", "update", "delete", "list", "availability"]
      description: "Full schedule management"

    milestone_tracker:
      permissions: ["read", "list", "track"]
      description: "Track milestone progress"

    milestone_manager:
      permissions: ["create", "read", "update", "delete", "list", "track"]
      description: "Full milestone management"

    contact_viewer:
      permissions: ["read", "list"]
      description: "View contact information"

    contact_manager:
      permissions:
        ["create", "read", "update", "delete", "manage", "list", "export"]
      description: "Full contact management"

  # ============================================================================
  # ROLE DEFINITIONS - User roles with permissions and capabilities
  # ============================================================================
  roles:
    PLATFORM_OVERSIGHT:
      description: "Platform-wide oversight and approval authority"
      level: 1000
      category: "platform"
      scope: "platform"
      permissions:
        - "*"
        - "admin:access"
        - "user:create"
        - "user:read"
        - "user:update"
        - "user:delete"
        - "user:list"
        - "user:list_all"
        - "organization:create"
        - "organization:read"
        - "organization:update"
        - "organization:delete"
        - "organization:list"
        - "organization:list_all"
        - "organization:manage"
        - "organization:configure"
        - "property:create"
        - "property:read"
        - "property:update"
        - "property:delete"
        - "property:list"
        - "property:list_all"
        - "property:view_all"
        - "lease:create"
        - "lease:read"
        - "lease:update"
        - "lease:delete"
        - "lease:list"
        - "lease:list_all"
        - "tenant:create"
        - "tenant:read"
        - "tenant:update"
