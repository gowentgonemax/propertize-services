# ============================================================================
# API Gateway - LOCAL Development Environment
# ============================================================================
# This profile is for local development on developer machines
# Services run on localhost with minimal security
# ============================================================================

server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          # Disable discovery-based routing for local - use explicit routes
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      # Direct Routes for Local Development (no Eureka dependency)
      routes:
        # Auth Service - Direct Route (MUST BE FIRST)
        # BUG FIX: was pointing to 8084 (nothing there); auth-service runs on 8081
        - id: auth-service-local
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        # Propertize Service - Direct Route
        # BUG FIX: was pointing to 8081 (auth-service port); propertize-service runs on 8082
        - id: propertize-service-local
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/properties/**,/api/v1/tenants/**,/api/v1/leases/**,/api/v1/payments/**,/api/v1/invoices/**,/api/v1/maintenance/**,/api/v1/organizations/**,/api/v1/users/**,/api/v1/rental-applications/**,/api/v1/admin/**,/graphql,/graphiql,/api/v1/analytics/**,/api/v1/application-fees/**,/api/v1/approvals/**,/api/v1/assets/**,/api/v1/audit/**,/api/v1/contacts/**,/api/v1/expenses/**,/api/v1/late-fees/**,/api/v1/messages/**,/api/v1/metrics/**,/api/v1/milestones/**,/api/v1/notification-preferences/**,/api/v1/notifications/**,/api/v1/organization-application-fees/**,/api/v1/payment-methods/**,/api/v1/payment-reminders/**,/api/v1/reports/**,/api/v1/schedule-events/**,/api/v1/search/**,/api/v1/screening/**,/api/v1/stripe/**,/api/v1/support/**,/api/v1/tasks/**,/api/v1/transactions/**,/api/v1/util/**,/api/v1/utilities/**,/api/v1/vendors/**,/api/v1/webhooks/**,/api/public/**,/api/v1/diagnostics/**
          filters:
            - StripPrefix=0

        # Employecraft Service - Direct Route
        # BUG FIX: was pointing to 8082 (propertize port); employee-service runs on 8083
        - id: employecraft-service-local
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/employees/**,/api/v1/departments/**,/api/v1/attendance/**
          filters:
            - StripPrefix=0

        # Wagecraft Service - Direct Route (not yet deployed; placeholder)
        - id: wagecraft-service-local
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payroll/**,/api/v1/salary/**,/api/v1/benefits/**
          filters:
            - StripPrefix=0

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

# Eureka Client Configuration
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# JWT Configuration (must match auth-service)
jwt:
  secret: dev-jwt-secret-key-change-in-production-min-32-chars
  public-key-path: config/keys/public_key.pem
  rsa:
    public-key-path: config/keys/public_key.pem
    private-key-path: config/keys/private_key.pem
  access-token-validity: 900000    # 15 minutes
  refresh-token-validity: 604800000 # 7 days

# Rate Limiting
gateway:
  rate-limit:
    enabled: true
    default-replenish-rate: 100
    default-burst-capacity: 200
  timeout:
    global: 30s
    per-route: 60s

# Logging
logging:
  level:
    root: INFO
    com.propertize.platform.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.server: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,routes
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

