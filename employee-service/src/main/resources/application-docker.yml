# ============================================================================
# Employee Service — DOCKER profile
# Active when: SPRING_PROFILES_ACTIVE=docker   (set by docker-compose.yml)
# Hosts:  postgres:5432  redis:6379  service-registry:8761
# ============================================================================
server:
  port: 8083
  max-http-request-header-size: 65536

spring:
  application:
    name: employee-service

  threads:
    virtual:
      enabled: true

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 200
        keep-alive: 60s
      thread-name-prefix: employee-async-
    scheduling:
      pool:
        size: 2
      thread-name-prefix: employee-sched-

  datasource:
    url: jdbc:postgresql://postgres:5432/propertize_db?stringtype=unspecified
    username: dbuser
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:dbpassword}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: UUID

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:redis_secure_pass}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@service-registry:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: employee-service # Docker container/service name
    instance-id: ${spring.application.name}:${server.port}

auth-service:
  url: http://auth-service:8081

propertize:
  api:
    url: http://propertize:8082

jwt:
  rsa:
    public-key-path: /app/config/keys/public_key.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

logging:
  level:
    root: INFO
    com.propertize.employee: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [DOCKER][employee] %-5level %logger{30} - %msg%n"
