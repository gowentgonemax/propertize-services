# ============================================================================
# Employecraft Service - DEV Environment
# ============================================================================

server:
  port: ${SERVER_PORT:8081}

spring:
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/employecraft}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION:900000}

# Eureka Client
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin@service-registry:8761/eureka/}
  instance:
    hostname: ${HOSTNAME:employecraft}
    prefer-ip-address: true
    metadata-map:
      environment: dev

# Propertize Integration
propertize:
  api:
    url: ${PROPERTIZE_URL:http://propertize-service:8080}
    timeout:
      connect: 5000
      read: 10000

# Wagecraft Integration
wagecraft:
  api:
    url: ${WAGECRAFT_URL:http://wagecraft-service:8082}

# Logging
logging:
  level:
    root: INFO
    com.employecraft: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

# Management
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
