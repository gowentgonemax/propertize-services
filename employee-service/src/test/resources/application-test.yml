spring:
  cloud:
    discovery:
      enabled: false
    loadbalancer:
      enabled: false
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

propertize:
  api:
    url: http://localhost:8082

services:
  auth:
    url: http://localhost:8081

logging:
  level:
    com.propertize: WARN
