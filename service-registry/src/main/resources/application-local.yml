# ============================================================================
# Service Registry (Eureka) - LOCAL Development Environment
# ============================================================================

server:
  port: 8761
spring:
  security:
    user:
      name: admin
      password: admin

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
  client:
    # This is a standalone Eureka server, so it doesn't register with itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disable self-preservation for development
    enable-self-preservation: false
    # Response cache update interval (in ms)
    response-cache-update-interval-ms: 5000
    # How long to wait before removing expired instances
    eviction-interval-timer-in-ms: 10000
    # Renewal threshold - percentage of renewals needed to prevent self-preservation
    renewal-percent-threshold: 0.85

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

# Logging configuration
logging:
  level:
    root: INFO
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    com.propertize.platform.registry: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
