# ============================================================================
# Wagecraft Service - TEST Environment
# ============================================================================

server:
  port: ${SERVER_PORT:8082}

spring:
  # Database Configuration - H2 for tests
  datasource:
    url: jdbc:h2:mem:wagecraft_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# JWT Configuration
jwt:
  secret: test-jwt-secret-key-for-testing-only-min-32-chars
  expiration: 86400
  refresh-expiration: 604800

# Security Configuration
security:
  mode: hybrid

# Eureka - Disabled for tests
eureka:
  client:
    enabled: false

# Logging
logging:
  level:
    root: INFO
    com.wagecraft: DEBUG
