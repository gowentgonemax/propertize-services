# ============================================================================
# Payroll Service — DOCKER profile
# Active when: SPRING_PROFILES_ACTIVE=docker   (set by docker-compose.yml)
# Hosts:  postgres:5432  service-registry:8761  auth-service:8081
# ============================================================================
server:
  port: 8085
  max-http-request-header-size: 65536

spring:
  application:
    name: payroll-service

  threads:
    virtual:
      enabled: true

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 200
        keep-alive: 60s
      thread-name-prefix: payroll-async-
    scheduling:
      pool:
        size: 2
      thread-name-prefix: payroll-sched-

  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:propertize_db}?stringtype=unspecified
    username: ${POSTGRES_USER:propertize}
    password: ${POSTGRES_PASSWORD:propertize123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: payroll-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.propertize.*
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:redis_secure_pass}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@service-registry:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: payroll-service
    instance-id: ${spring.application.name}:${server.port}

auth-service:
  url: http://auth-service:8081

propertize:
  api:
    url: http://propertize:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

logging:
  level:
    root: INFO
    com.propertize.payroll: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [DOCKER][payroll] %-5level %logger{30} - %msg%n"
