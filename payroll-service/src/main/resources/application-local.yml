# ============================================================================
# Wagecraft Service - LOCAL Development Environment
# ============================================================================

server:
  port: 8083

spring:
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/wagecraft
    username: ${DB_USERNAME:ravishah}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# JWT Configuration (must match auth-service)
jwt:
  secret: dev-jwt-secret-key-change-in-production-min-32-chars
  expiration: 86400
  refresh-expiration: 604800

# Security Configuration
security:
  gateway:
    expected-value: api-gateway
  mode: hybrid

# Eureka Client
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Service Integration
services:
  propertize:
    url: http://localhost:8081
  employecraft:
    url: http://localhost:8082

# Logging
logging:
  level:
    root: INFO
    com.wagecraft: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

# Management
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
