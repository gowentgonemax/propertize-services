name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # -------------------------------------------------------------------------
  # 1. Build + unit-test: propertize-commons (shared library)
  # -------------------------------------------------------------------------
  commons-test:
    name: "commons – build & test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: propertize-commons
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & test
        run: mvn -B verify --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commons-surefire
          path: propertize-commons/target/surefire-reports/

  # -------------------------------------------------------------------------
  # 2. Build + unit-test: payroll-service
  # -------------------------------------------------------------------------
  payroll-test:
    name: "payroll-service – build & test"
    runs-on: ubuntu-latest
    needs: commons-test
    defaults:
      run:
        working-directory: payroll-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # Install commons to local M2 so payroll-service can resolve it
      - name: Install propertize-commons
        run: |
          cd ../propertize-commons
          mvn -B install -DskipTests --no-transfer-progress

      - name: Build & test
        run: mvn -B verify --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payroll-surefire
          path: payroll-service/target/surefire-reports/

  # -------------------------------------------------------------------------
  # 3. Build + unit-test: employee-service
  # -------------------------------------------------------------------------
  employee-test:
    name: "employee-service – build & test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: employee-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & test
        run: mvn -B verify --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee-surefire
          path: employee-service/target/surefire-reports/

  # -------------------------------------------------------------------------
  # 4. Frontend lint + type-check + build
  # -------------------------------------------------------------------------
  frontend-ci:
    name: "frontend – lint, type-check & build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: propertize-front-end
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: propertize-front-end/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000

  # -------------------------------------------------------------------------
  # 5. API contract tests via Bruno CLI (runs after services compile)
  # -------------------------------------------------------------------------
  api-contract-tests:
    name: "Bruno – API contract tests"
    runs-on: ubuntu-latest
    needs: [payroll-test, employee-test]
    # Only run on push to main/develop; skip on draft PRs to save minutes
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start infra (postgres, redis, kafka)
        run: docker compose -f docker-compose.infra.yml up -d
        env:
          COMPOSE_PROFILES: infra

      - name: Wait for infra
        run: |
          echo "Waiting for postgres..."
          until docker compose -f docker-compose.infra.yml exec -T postgres pg_isready -U propertize; do sleep 2; done

      - name: Run Bruno collection (auth + users smoke tests)
        run: |
          cd propertize/bruno-collection
          bru run "01-Authentication" --env CI --reporter-json results.json || true
          bru run "10-Users" --env CI --reporter-json results-users.json || true

      - name: Upload Bruno results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-results
          path: propertize/bruno-collection/*.json

      - name: Stop infra
        if: always()
        run: docker compose -f docker-compose.infra.yml down -v

  # -------------------------------------------------------------------------
  # 6. Security scan (OWASP Dependency Check — weekly or on main push)
  # -------------------------------------------------------------------------
  security-scan:
    name: "OWASP dependency check"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          [payroll-service, employee-service, auth-service, propertize-commons]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: OWASP check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=8 \
            -DsuppressionFile=../scripts/owasp-suppressions.xml \
            --no-transfer-progress || true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-${{ matrix.service }}
          path: ${{ matrix.service }}/target/dependency-check-report.html
