rbac:
  version: "6.0-industrial"
  lastUpdated: "2026-02-15"

  # ============================================================================
  # CORE CONFIGURATION
  # ============================================================================
  core:
    defaultScope: "self"
    enableInheritance: true
    enableDynamicPermissions: false # Disabled for security
    enableRoleComposition: true
    enablePermissionTemplates: true
    cachePermissions: true
    cacheTTL: 3600
    allowRuntimeRoleCreation: false # Disabled for security
    maxCustomRolesPerClient: 10

  # ============================================================================
  # PERMISSION NAMING CONVENTION:
  # Format: RESOURCE_ACTION (e.g., USER_CREATE, PROPERTY_READ)
  # - All UPPERCASE with underscore
  # - Clear, consistent, predictable
  # ============================================================================

  # ============================================================================
  # PERMISSION HIERARCHY - Reduces duplication via inheritance
  # ============================================================================
  permissionHierarchy:
    # When you have USER_MANAGE, you automatically get USER_READ
    USER_MANAGE:
      includes:
        ["USER_CREATE", "USER_READ", "USER_UPDATE", "USER_DELETE", "USER_LIST"]

    ORGANIZATION_MANAGE:
      includes:
        [
          "ORGANIZATION_CREATE",
          "ORGANIZATION_READ",
          "ORGANIZATION_UPDATE",
          "ORGANIZATION_DELETE",
          "ORGANIZATION_LIST",
          "ORGANIZATION_CONFIGURE",
        ]

    PROPERTY_MANAGE:
      includes:
        [
          "PROPERTY_CREATE",
          "PROPERTY_READ",
          "PROPERTY_UPDATE",
          "PROPERTY_DELETE",
          "PROPERTY_LIST",
        ]

    LEASE_MANAGE:
      includes:
        [
          "LEASE_CREATE",
          "LEASE_READ",
          "LEASE_UPDATE",
          "LEASE_DELETE",
          "LEASE_LIST",
          "LEASE_APPROVE",
          "LEASE_TERMINATE",
          "LEASE_RENEW",
        ]

    TENANT_MANAGE:
      includes:
        [
          "TENANT_CREATE",
          "TENANT_READ",
          "TENANT_UPDATE",
          "TENANT_DELETE",
          "TENANT_LIST",
          "TENANT_SCREEN",
          "TENANT_COMMUNICATE",
        ]

    PAYMENT_MANAGE:
      includes:
        [
          "PAYMENT_CREATE",
          "PAYMENT_READ",
          "PAYMENT_UPDATE",
          "PAYMENT_DELETE",
          "PAYMENT_LIST",
          "PAYMENT_PROCESS",
          "PAYMENT_RECONCILE",
        ]

    MAINTENANCE_MANAGE:
      includes:
        [
          "MAINTENANCE_CREATE",
          "MAINTENANCE_READ",
          "MAINTENANCE_UPDATE",
          "MAINTENANCE_DELETE",
          "MAINTENANCE_LIST",
          "MAINTENANCE_ASSIGN",
          "MAINTENANCE_APPROVE",
          "MAINTENANCE_COMPLETE",
        ]

    INVOICE_MANAGE:
      includes:
        [
          "INVOICE_CREATE",
          "INVOICE_READ",
          "INVOICE_UPDATE",
          "INVOICE_DELETE",
          "INVOICE_LIST",
          "INVOICE_SEND",
        ]

    REPORT_FULL:
      includes:
        [
          "REPORT_CREATE",
          "REPORT_READ",
          "REPORT_UPDATE",
          "REPORT_DELETE",
          "REPORT_LIST",
          "REPORT_GENERATE",
          "REPORT_EXPORT",
          "REPORT_CUSTOMIZE",
        ]

    SYSTEM_ADMIN:
      includes:
        [
          "SYSTEM_CONFIGURE",
          "SYSTEM_MONITOR",
          "SYSTEM_BACKUP",
          "SYSTEM_RESTORE",
          "SYSTEM_UPDATE",
          "SYSTEM_TROUBLESHOOT",
        ]

  # ============================================================================
  # SCOPE DEFINITIONS
  # ============================================================================
  scopes:
    platform:
      description: "Platform-wide access across all organizations"
      level: 1000

    portfolio:
      description: "Multiple organizations (investor/portfolio owner)"
      level: 900

    organization:
      description: "Single organization scope"
      level: 800

    team:
      description: "Team or department within organization"
      level: 500

    self:
      description: "Individual user scope only"
      level: 100

  # ============================================================================
  # ROLES CONFIGURATION
  # ============================================================================
  roles:
    # ==========================================================================
    # PLATFORM ROLES - Oversee platform, READ-ONLY for organizations
    # ==========================================================================

    PLATFORM_OVERSIGHT:
      description: "Platform oversight - monitors all organizations (READ-ONLY)"
      level: 1000
      category: "platform"
      scope: "platform"
      permissions:
        # === Core Access ===
        - "ADMIN_ACCESS"

        # === User Management (Full) ===
        - "USER_MANAGE" # Expands to: CREATE, READ, UPDATE, DELETE, LIST
        - "USER_INVITE"

        # === Organization (READ-ONLY) ===
        - "ORGANIZATION_READ"
        - "ORGANIZATION_LIST"
        # NO CREATE/UPDATE/DELETE/MANAGE - Platform staff don't own orgs

        # === Properties (READ-ONLY) ===
        - "PROPERTY_READ"
        - "PROPERTY_LIST"

        # === Leases (READ-ONLY) ===
        - "LEASE_READ"
        - "LEASE_LIST"

        # === Tenants (READ-ONLY) ===
        - "TENANT_READ"
        - "TENANT_LIST"

        # === Payments (READ-ONLY) ===
        - "PAYMENT_READ"
        - "PAYMENT_LIST"

        # === Maintenance (READ-ONLY) ===
        - "MAINTENANCE_READ"
        - "MAINTENANCE_LIST"

        # === Invoices (READ-ONLY) ===
        - "INVOICE_READ"
        - "INVOICE_LIST"

        # === Reporting (Full) ===
        - "REPORT_FULL" # Expands to all report permissions

        # === Analytics (Full) ===
        - "ANALYTICS_READ"
        - "ANALYTICS_ANALYZE"
        - "ANALYTICS_EXPORT"

        # === Dashboard ===
        - "DASHBOARD_READ"
        - "DASHBOARD_VIEW"
        - "DASHBOARD_READ_PLATFORM_DASHBOARD"
        - "DASHBOARD_READ_OVERSIGHT_DASHBOARD"

        # === Session Management ===
        - "SESSION_LIST"
        - "SESSION_TERMINATE"

        # === System (Full) ===
        - "SYSTEM_ADMIN" # Expands to all system permissions

        # === Audit (Full) ===
        - "AUDIT_LOG_READ"
        - "AUDIT_LOG_EXPORT"

        # === Notifications ===
        - "NOTIFICATION_READ"
        - "NOTIFICATION_SEND"

      explicitDenials:
        - "ORGANIZATION_CREATE"
        - "ORGANIZATION_UPDATE"
        - "ORGANIZATION_DELETE"
        - "ORGANIZATION_CONFIGURE"
        - "ORGANIZATION_MANAGE"
        - "PROPERTY_CREATE"
        - "PROPERTY_UPDATE"
        - "PROPERTY_DELETE"
        - "PROPERTY_MANAGE"

      capabilities:
        emergencyAccess: true
        fullSystemAccess: false
        bypassRestrictions: false
        canManageOrganizations: false

      restrictions:
        requireMFA: true
        auditAllActions: true
        cannotDeleteSelf: true

    PLATFORM_OPERATIONS:
      description: "Platform operations - manage organizations"
      level: 970
      category: "platform"
      scope: "platform"
      permissions:
        - "ORGANIZATION_MANAGE" # Full org management
        - "USER_MANAGE"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "REPORT_EXPORT"
        - "SYSTEM_MONITOR"
        - "DASHBOARD_READ_PLATFORM_DASHBOARD"

    PLATFORM_ENGINEERING:
      description: "System operations and infrastructure"
      level: 950
      category: "platform"
      scope: "platform"
      permissions:
        - "SYSTEM_ADMIN"
        - "AUDIT_LOG_READ"

    PLATFORM_ANALYTICS:
      description: "Business intelligence and analytics"
      level: 930
      category: "platform"
      scope: "platform"
      permissions:
        - "REPORT_FULL"
        - "ANALYTICS_READ"
        - "ANALYTICS_ANALYZE"
        - "ANALYTICS_EXPORT"
        - "DASHBOARD_READ_PLATFORM_DASHBOARD"

    # ==========================================================================
    # ORGANIZATION ROLES - Own and manage organizations
    # ==========================================================================

    PORTFOLIO_OWNER:
      description: "Multi-organization portfolio investor"
      level: 920
      category: "portfolio"
      scope: "portfolio"
      permissions:
        - "ORGANIZATION_READ"
        - "ORGANIZATION_LIST"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "LEASE_READ"
        - "LEASE_LIST"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "REPORT_EXPORT"
        - "DASHBOARD_READ_PORTFOLIO_DASHBOARD"

    ORGANIZATION_OWNER:
      description: "Organization owner/landlord - full control"
      level: 900
      category: "organization"
      scope: "organization"
      permissions:
        - "ORGANIZATION_READ"
        - "ORGANIZATION_UPDATE"
        - "ORGANIZATION_CONFIGURE"
        - "USER_MANAGE"
        - "PROPERTY_MANAGE"
        - "LEASE_MANAGE"
        - "TENANT_MANAGE"
        - "PAYMENT_MANAGE"
        - "MAINTENANCE_MANAGE"
        - "INVOICE_MANAGE"
        - "REPORT_FULL"
        - "DASHBOARD_READ_MANAGER"
        - "DASHBOARD_READ_PORTFOLIO_DASHBOARD"

    ORGANIZATION_ADMIN:
      description: "Organization administrator"
      level: 850
      category: "organization"
      scope: "organization"
      inherits: ["ORGANIZATION_OWNER"]
      permissions:
        - "ORGANIZATION_READ"
        - "USER_CREATE"
        - "USER_READ"
        - "USER_UPDATE"
        - "USER_LIST"
        - "PROPERTY_MANAGE"
        - "LEASE_MANAGE"
        - "TENANT_MANAGE"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "MAINTENANCE_MANAGE"
        - "INVOICE_MANAGE"

    PROPERTY_MANAGER:
      description: "Property portfolio manager"
      level: 800
      category: "organization"
      scope: "organization"
      permissions:
        - "PROPERTY_MANAGE"
        - "LEASE_MANAGE"
        - "TENANT_MANAGE"
        - "MAINTENANCE_MANAGE"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "INVOICE_CREATE"
        - "INVOICE_READ"
        - "INVOICE_SEND"
        - "REPORT_GENERATE"
        - "DASHBOARD_READ_MANAGER"

    LEASING_AGENT:
      description: "Leasing and tenant relations"
      level: 700
      category: "organization"
      scope: "team"
      permissions:
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "LEASE_CREATE"
        - "LEASE_READ"
        - "LEASE_UPDATE"
        - "LEASE_LIST"
        - "TENANT_MANAGE"
        - "INVOICE_CREATE"
        - "INVOICE_READ"
        - "DASHBOARD_READ_LEASING_DASHBOARD"

    MAINTENANCE_SUPERVISOR:
      description: "Maintenance operations supervisor"
      level: 650
      category: "organization"
      scope: "team"
      permissions:
        - "MAINTENANCE_MANAGE"
        - "PROPERTY_READ"
        - "PROPERTY_LIST"
        - "DASHBOARD_READ_MAINTENANCE_DASHBOARD"

    ACCOUNTANT:
      description: "Financial operations and reporting"
      level: 600
      category: "organization"
      scope: "team"
      permissions:
        - "PAYMENT_MANAGE"
        - "INVOICE_MANAGE"
        - "REPORT_GENERATE"
        - "REPORT_READ"
        - "REPORT_EXPORT"
        - "DASHBOARD_READ_FINANCIAL_DASHBOARD"

    # ==========================================================================
    # OPERATIONAL ROLES
    # ==========================================================================

    MAINTENANCE_TECHNICIAN:
      description: "Maintenance work execution"
      level: 400
      category: "operational"
      scope: "team"
      permissions:
        - "MAINTENANCE_READ"
        - "MAINTENANCE_UPDATE"
        - "MAINTENANCE_COMPLETE"
        - "PROPERTY_READ"

    TENANT:
      description: "Tenant portal access"
      level: 200
      category: "external"
      scope: "self"
      permissions:
        - "TENANT_READ"
        - "TENANT_UPDATE"
        - "PAYMENT_CREATE"
        - "PAYMENT_READ"
        - "PAYMENT_LIST"
        - "LEASE_READ"
        - "LEASE_LIST"
        - "MAINTENANCE_CREATE"
        - "MAINTENANCE_READ"
        - "MAINTENANCE_LIST"
        - "PROPERTY_READ"
        - "DOCUMENT_READ"
        - "DOCUMENT_UPLOAD"
        - "DOCUMENT_DOWNLOAD"
        - "NOTIFICATION_READ"
        - "DASHBOARD_VIEW"
        - "DASHBOARD_PORTAL"

    VENDOR:
      description: "Vendor portal access"
      level: 150
      category: "external"
      scope: "self"
      permissions:
        - "MAINTENANCE_READ"
        - "MAINTENANCE_UPDATE"
        - "INVOICE_CREATE"
        - "INVOICE_READ"

    APPLICANT:
      description: "Rental applicant"
      level: 100
      category: "external"
      scope: "self"
      permissions:
        - "PROPERTY_READ"
        - "LEASE_READ"

    READ_ONLY:
      description: "Read-only observer"
      level: 50
      category: "external"
      scope: "self"
      permissions:
        - "PROPERTY_READ"
        - "DASHBOARD_VIEW"

  # ============================================================================
  # ENDPOINT MAPPINGS (Optional - for API Gateway)
  # ============================================================================
  endpoints:
    "/api/v1/users":
      GET: "USER_LIST"
      POST: "USER_CREATE"
    "/api/v1/users/{id}":
      GET: "USER_READ"
      PUT: "USER_UPDATE"
      DELETE: "USER_DELETE"
    "/api/v1/organizations":
      GET: "ORGANIZATION_LIST"
      POST: "ORGANIZATION_CREATE"
    "/api/v1/organizations/{id}":
      GET: "ORGANIZATION_READ"
      PUT: "ORGANIZATION_UPDATE"
      DELETE: "ORGANIZATION_DELETE"
    "/api/v1/properties":
      GET: "PROPERTY_LIST"
      POST: "PROPERTY_CREATE"
    "/api/v1/properties/{id}":
      GET: "PROPERTY_READ"
      PUT: "PROPERTY_UPDATE"
      DELETE: "PROPERTY_DELETE"

  # ============================================================================
  # TIME RESTRICTIONS - Restrict access by time-of-day and day-of-week
  # ============================================================================
  timeRestrictions:
    MAINTENANCE_TECHNICIAN:
      activeHours: "06:00-22:00"
      activeDays: ["MON", "TUE", "WED", "THU", "FRI", "SAT"]
      timezone: "America/New_York"
    LEASING_AGENT:
      activeHours: "08:00-20:00"
      activeDays: ["MON", "TUE", "WED", "THU", "FRI", "SAT"]
      timezone: "America/New_York"
    ACCOUNTANT:
      activeHours: "07:00-19:00"
      activeDays: ["MON", "TUE", "WED", "THU", "FRI"]
      timezone: "America/New_York"

  # ============================================================================
  # FIELD-LEVEL PERMISSIONS - Control which fields are visible per role
  # ============================================================================
  fieldLevelPermissions:
    tenant:
      PLATFORM_OVERSIGHT:
        visible:
          [
            "name",
            "email",
            "phone",
            "lease_info",
            "payment_status",
            "ssn",
            "bank_account",
            "credit_score",
          ]
      ORGANIZATION_OWNER:
        visible:
          [
            "name",
            "email",
            "phone",
            "lease_info",
            "payment_status",
            "credit_score",
          ]
        hidden: ["ssn", "bank_account"]
      PROPERTY_MANAGER:
        visible: ["name", "email", "phone", "lease_info", "payment_status"]
        hidden: ["ssn", "bank_account", "credit_score"]
      LEASING_AGENT:
        visible: ["name", "email", "phone", "rental_application"]
        hidden: ["ssn", "bank_account", "payment_history", "credit_score"]
      ACCOUNTANT:
        visible: ["name", "payment_status", "balance", "payment_history"]
        hidden: ["ssn", "credit_score", "phone"]
      MAINTENANCE_TECHNICIAN:
        visible: ["name", "phone", "unit_number"]
        hidden:
          [
            "ssn",
            "bank_account",
            "credit_score",
            "payment_status",
            "payment_history",
            "email",
          ]
    property:
      PLATFORM_OVERSIGHT:
        visible:
          [
            "address",
            "name",
            "units",
            "status",
            "purchase_price",
            "current_value",
            "private_notes",
            "target_rent",
          ]
      ORGANIZATION_OWNER:
        visible:
          [
            "address",
            "name",
            "units",
            "status",
            "purchase_price",
            "current_value",
            "private_notes",
            "target_rent",
          ]
      PROPERTY_MANAGER:
        visible:
          ["address", "name", "units", "status", "target_rent", "private_notes"]
        hidden: ["purchase_price", "current_value"]
      LEASING_AGENT:
        visible: ["address", "name", "units", "status", "availability"]
        hidden:
          ["purchase_price", "current_value", "private_notes", "target_rent"]
      ACCOUNTANT:
        visible:
          ["address", "name", "purchase_price", "current_value", "rent_roll"]
        hidden: ["private_notes", "target_rent"]
      MAINTENANCE_TECHNICIAN:
        visible: ["address", "name", "units", "condition"]
        hidden:
          ["purchase_price", "current_value", "private_notes", "target_rent"]

  # ============================================================================
  # DATA SCOPES - Row-Level Security (which records a role can access)
  # ============================================================================
  dataScopes:
    PROPERTY_MANAGER:
      property: "assigned_portfolio"
      tenant: "own_properties"
      maintenance: "own_properties"
      lease: "own_properties"
    LEASING_AGENT:
      property: "own_region"
      tenant: "own_region"
      lease: "own_properties"
    MAINTENANCE_SUPERVISOR:
      property: "own_properties"
      maintenance: "own_properties"
    MAINTENANCE_TECHNICIAN:
      maintenance: "self_only"
      property: "own_properties"
    ACCOUNTANT:
      payment: "own_organization"
      invoice: "own_organization"
    TENANT:
      lease: "self_only"
      payment: "self_only"
      maintenance: "self_only"

  # ============================================================================
  # CONDITIONAL PERMISSIONS - Amount and value limits per role
  # ============================================================================
  conditionalPermissions:
    PROPERTY_MANAGER:
      "payment:approve":
        max_amount: 5000
      "maintenance:approve":
        max_cost: 2500
    ORGANIZATION_ADMIN:
      "payment:approve":
        max_amount: 25000
        requires_secondary_approval_above: 10000
    MAINTENANCE_SUPERVISOR:
      "maintenance:approve":
        max_cost: 10000
    ACCOUNTANT:
      "payment:approve":
        max_amount: 10000

  # ============================================================================
  # DYNAMIC ROLE COMPOSITION - Context-based role activation
  # ============================================================================
  dynamicRoleComposition:
    ORGANIZATION_OWNER:
      activateWhen:
        org_status: "ACTIVE"
        user_verified: true
      additionalRoles:
        - "FINANCIAL_ANALYST"
    PORTFOLIO_OWNER:
      conditions:
        subscription_plan: ["PREMIUM", "ENTERPRISE"]
      additionalRoles:
        - "ANALYTICS_VIEWER"
