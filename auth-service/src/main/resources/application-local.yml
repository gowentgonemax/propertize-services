# ============================================================================
# Auth Service - LOCAL Development Environment
# ============================================================================

server:
  port: 8081

spring:
  # Database Configuration - Local PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/propertize_auth
    username: ${DB_USERNAME:ravishah}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis Configuration - Local instance
  data:
    redis:
      host: localhost
      port: 6379
      # BUG FIX: was empty — Docker Redis requires 'redis_secure_pass' (set via .env)
      password: ${REDIS_PASSWORD:redis_secure_pass}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

# Eureka Client Configuration
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# JWT Configuration
jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH:auth-service/keys/private_key.pem}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:auth-service/keys/public_key.pem}

security:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-key-change-in-production-min-32-chars-propertize}
    access-token-expiration-ms: 900000 # 15 minutes
    refresh-token-expiration-ms: 604800000 # 7 days
    service-token-expiration-ms: 300000 # 5 minutes
    issuer: ${JWT_ISSUER:auth-service}
  rsa:
    public-key-path: auth-service/keys/public_key.pem
    private-key-path: auth-service/keys/private_key.pem
    auto-generate: false

# Token Blacklist Configuration
token:
  blacklist:
    enabled: true
    cleanup-interval: 3600000 # 1 hour
    cache-ttl: 86400 # 24 hours

# Logging
logging:
  level:
    root: INFO
    com.propertize.platform.auth: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Service URLs (direct for local development - bypasses Eureka)
services:
  propertize:
    url: http://localhost:8081
  service-auth:
    enabled: true
    services:
      - name: api-gateway
        key: ${GATEWAY_SERVICE_KEY:gateway-dev-secret-key}
        allowedScopes:
          - auth:validate
          - auth:refresh
      - name: propertize-service
        key: ${PROPERTIZE_SERVICE_KEY:propertize-dev-secret-key}
        allowedScopes:
          - user:read
          - organization:read
      - name: employecraft
        key: ${EMPLOYECRAFT_SERVICE_KEY:employecraft-dev-secret-key}
        allowedScopes:
          - employee:read
          - payroll:read
      - name: wagecraft
        key: ${WAGECRAFT_SERVICE_KEY:wagecraft-dev-secret-key}
        allowedScopes:
          - payroll:read
          - compensation:read
