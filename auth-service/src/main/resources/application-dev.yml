# ============================================================================
# Auth Service - DEV Environment
# ============================================================================

server:
  port: ${AUTH_SERVICE_PORT:8090}

spring:
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/propertize_auth}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

# Eureka Client Configuration
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin@service-registry:8761/eureka/}
    registry-fetch-interval-seconds: 10
  instance:
    hostname: ${HOSTNAME:auth-service}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      environment: dev

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private_key.pem}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public_key.pem}
  access-token-validity: ${JWT_ACCESS_VALIDITY:900000}
  refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800000}
  issuer: ${JWT_ISSUER:propertize-auth-dev}

# Token Blacklist Configuration
token:
  blacklist:
    enabled: true
    cleanup-interval: 3600000
    cache-ttl: 86400

# Logging
logging:
  level:
    root: INFO
    com.propertize.platform.auth: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"

# Management & Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
