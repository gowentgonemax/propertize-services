server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful
  max-http-request-header-size: 65536

spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:propertize_db}
    username: ${POSTGRES_USER:dbuser}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PaymentServicePool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 200
        keep-alive: 60s
      thread-name-prefix: payment-async-
    scheduling:
      pool:
        size: 2
      thread-name-prefix: payment-sched-

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

# Eureka Service Registry
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

# Stripe Payment Gateway
payment:
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_dummy}
    enabled: ${STRIPE_ENABLED:true}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    currency: ${STRIPE_CURRENCY:usd}
    api-version: ${STRIPE_API_VERSION:2025-12-15.clover}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_dummy}
  default-gateway: STRIPE
  retry:
    max-attempts: 3
    backoff-delay: 2000

# Resilience4j — Stripe circuit breaker + retry
resilience4j:
  circuitbreaker:
    instances:
      stripePayment:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      stripePayment:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    instances:
      stripePayment:
        timeout-duration: 30s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.propertize.payment: INFO
    org.springframework.web: WARN
    com.stripe: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}] - %msg%n"

# SpringDoc OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
