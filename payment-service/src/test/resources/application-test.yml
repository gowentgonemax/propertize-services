server:
  port: 0

spring:
  application:
    name: payment-service-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

eureka:
  client:
    enabled: false

payment:
  stripe:
    api-key: sk_test_dummy_key_for_testing
    enabled: false
    webhook-secret: whsec_test_secret
    currency: usd
  default-gateway: STRIPE

logging:
  level:
    root: WARN
    com.propertize.payment: DEBUG
